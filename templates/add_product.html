<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Product • Green Archade</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/">
                <span class="brand-badge" aria-hidden="true"></span>
                <span>Green Archade</span>
            </a>
            <nav class="nav">
                <a href="/products">Products</a>
                <a href="/products/add">Add Product</a>
                <a href="/sale/new">New Sale</a>
                <a href="/sales">Sales</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Add Product</h1>
                <p class="page-subtitle">Add a new item to your computer shop inventory.</p>
            </div>
            <div class="actions">
                <a class="btn" href="/products">Back to Products</a>
            </div>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        <div class="card">
            <div class="card-inner">
                <form method="POST" action="/products/add">
                    <div class="grid">
                        <div class="col-6">
                            <div class="field">
                                <div class="label">Product ID</div>
                                <input type="number" name="id" min="1" placeholder="e.g. 1001" required>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="field">
                                <div class="label">Stock</div>
                                <input type="number" name="stock" min="0" placeholder="e.g. 15" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="field">
                                <div class="label">Name</div>
                                <input type="text" name="name" placeholder="e.g. NVMe SSD 1TB (PCIe 4.0)" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="field">
                                <div class="label">Price</div>
                                <input type="number" name="price" step="0.01" min="0" placeholder="e.g. 24999.00" required>
                            </div>
                        </div>
                    </div>

                    <div class="actions" style="justify-content:flex-start;margin-top:8px">
                        <button class="btn btn-primary" type="submit">Save Product</button>
                        <a class="btn" href="/products">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>Green Archade</span>
            <span>Add Product</span>
        </div>
    </footer>
</div>
<script>
  (function () {
    var path = window.location.pathname || "/";
    var links = document.querySelectorAll(".nav a[href]");
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute("href") || "";
      if (href === "/" && path === "/") links[i].classList.add("active");
      else if (href !== "/" && path.indexOf(href) === 0) links[i].classList.add("active");
    }
  })();
</script>
</body>
</html>
